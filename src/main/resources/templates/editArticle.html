<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Formulaire modification article</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4 mb-3">
        <div class="card border-dark">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="mb-0">Modifier un article</h4>
            </div>
            <div class="card-body">
    <form th:action="@{/save}" th:object="${article}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Marque</label>
            <input type="text" th:field="*{brand}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Modèle</label>
            <input type="text" th:field="*{model}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Prix (€)</label>
            <input type="number" th:field="*{price}" class="form-control" step="0.01" min="0">
        </div>

        <div class="mb-3">
            <label class="form-label">Catégorie</label>
            <select name="categoryId" class="form-select">
                <option value="">-- Sélectionner une catégorie --</option>
                <option th:each="cat : ${listCategories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${article.category != null && article.category.id == cat.id}">
                </option>
            </select>
        </div>

        <div class="d-flex gap-2 justify-content-end">
            <button type="submit" class="btn btn-success">Enregistrer</button>
            <a th:href="@{/index}" class="btn btn-danger">Annuler</a>
        </div>
    </form>
    </div>
        </div>
    </div>
</div>
</body>
</html>
