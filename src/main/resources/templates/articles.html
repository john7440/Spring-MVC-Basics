<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Mes articles</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0 text-primary fw-bold">Liste des articles</h4>
            <a th:if="${session.currentUser != null && session.currentUser.role == 'ADMIN'}"
               th:href="@{/formArticle}" class="btn btn-success">
                + Nouvel article
            </a>
        </div>

        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body py-2">
                <form th:action="@{/index}" method="get" class="d-flex gap-2 align-items-center">
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control" placeholder="Rechercher un article...">
                    <button type="submit" class="btn btn-primary px-4">Rechercher</button>
                    <a th:href="@{/index}" class="btn btn-outline-secondary">Réinitialiser</a>
                </form>
            </div>
        </div>

        <div class="mb-3 d-flex flex-wrap gap-2">
            <a th:href="@{/index(keyword=${keyword})}"
               class="btn btn-sm"
               th:classappend="${currentCategory == null} ? 'btn-dark' : 'btn-outline-dark'">
                Toutes
            </a>
            <a th:each="cat : ${listCategories}"
               th:href="@{/index(keyword=${keyword}, categoryId=${cat.id})}"
               class="btn btn-sm"
               th:classappend="${currentCategory == cat.id} ? 'btn-dark' : 'btn-outline-dark'"
               th:text="${cat.name}">
            </a>
        </div>

        <div class="card border-1  border-dark shadow-xl">
            <div class="card-body p-0">
                <table class="table table-hover table-striped align-middle mb-0">
                    <thead class="table-primary">
                    <tr>
                        <th>Marque</th>
                        <th>Modèle</th>
                        <th>Description</th>
                        <th>Prix</th>
                        <th>Catégorie</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(listArticle)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            Aucun article trouvé
                        </td>
                    </tr>
                    <tr th:each="a : ${listArticle}">
                        <td th:text="${a.brand}"></td>
                        <td th:text="${a.model}"></td>
                        <td th:text="${a.description}"></td>
                        <td>
                            <span class="badge bg-success" th:text="${a.price} + ' €'"></span>
                        </td>
                        <td>
                            <span class="badge bg-warning" th:text="${a.category != null ? a.category.name : 'N/A'}"></span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-success me-1"
                               th:data-id="${a.id}"
                               th:data-name="${a.brand + ' ' + a.model}"
                               th:data-price="${a.price}"
                               onclick="addToCart(this.dataset.id, this.dataset.name, parseFloat(this.dataset.price))">
                                Ajouter au panier
                            </button>

                            <th:block th:if="${session.currentUser != null && session.currentUser.role == 'ADMIN'}">
                                <a class="btn btn-sm btn-warning me-1"
                                   th:href="@{/editArticle(id=${a.id})}">Modifier</a>
                                <a class="btn btn-sm btn-danger"
                                   th:href="@{/delete(id=${a.id}, page=${currentPage}, keyword=${keyword})}"
                                   onclick="return confirm('Supprimer cet article ?')">Supprimer</a>
                            </th:block>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <nav class="mt-3">
            <ul class="pagination justify-content-center">
                <li th:each="page, status : ${pages}"
                    class="page-item"
                    th:classappend="${currentPage == status.index} ? 'active' : ''">
                    <a class="page-link"
                       th:href="@{/index(page=${status.index}, keyword=${keyword})}"
                       th:text="${status.index + 1}">
                    </a>
                </li>
            </ul>
        </nav>

    </div>
    <script>
        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(i => i.id === id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            alert(`"${name}" ajouté au panier !`);
        }

    </script>
</div>


</body>
</html>
