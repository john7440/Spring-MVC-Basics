<!DOCTYPE html>
<html xmlns:th = "http://thymeleaf.org"
      xmlns:layout = "http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate = "layout">
</head>
<body>
        <div layout:fragment="content">
        <div class = "container mt-4">
            <div class="card border-primary">
                <div class="card-header bg-primary text-white text-center">Liste des articles</div>
                <div class="card-body">
                    <form th:action="@{/index}" method="get">
                        <label>Mot clé</label>
                        <input type="text" name="keyword">
                        <button type="submit" class="btn btn-primary"> Rechercher</button>
                    </form>
                </div>
                <div class="card-body">
                    <table>
                        <tr>
                            <th>ID</th> <th>Marque</th> <th>Modèle</th> <th>Description</th> <th>Prix</th>
                        </tr>
                        <tr th:each="a:${listArticle}">
                            <td th:text="${a.id}"></td>
                            <td th:text="${a.brand}"></td>
                            <td th:text="${a.model}"></td>
                            <td th:text="${a.description}"></td>
                            <td th:text="${a.price}"></td>
                            <td>
                                <a class="btn btn-danger" th:href="@{/delete(id=${a.id}, page=${currentPage}, keyword=${keyword})}">Supprimer</a>
                            </td>
                        </tr>
                    </table>
                    <ul class ="nav nav-pills">
                        <li th:class="${currenPage==status.index}?'active':''" th:each="page,status:${pages}">
                            <a th:href="@{/index(page=${status.index}, keyword=${keyword})}" th:text="${status.index}"></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        </div>
</body>
</html>
