<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Connexion</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-dark text-white text-center">
                        <h5 class="mb-0">Connexion</h5>
                    </div>
                    <div class="card-body">

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nom d'utilisateur</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="container d-flex justify-content-space-between me-3">
                                <button type="submit" class="btn btn-success w-50 me-3">Se connecter</button>
                                <button type="submit" class="btn btn-danger w-50">Annuler</button>
                            </div>

                        </form>

                        <hr>
                        <p class="text-center mb-0">
                            Pas encore de compte ?
                            <a th:href="@{/register}">S'inscrire</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
