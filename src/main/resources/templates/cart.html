<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Mon panier</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3 mt-3">
            <h4 class="text-dark fw-bold">Mon panier</h4>
            <a th:href="@{/index}" class="btn btn-outline-primary">Continuer mes achats</a>
        </div>

        <!-- si non connecté -->
        <div th:if="${currentUser == null}" class="alert alert-warning text-center">
            Vous devez être <a th:href="@{/login}">connecté</a> pour passer une commande
        </div>

        <div id="emptyCart" class="alert alert-info text-center d-none mb-5 mt-5">
            Votre panier est vide
        </div>

        <!--le contenu panier -->
        <div id="cartContainer" class="d-none mb-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                        <tr>
                            <th>Article</th>
                            <th>Prix unitaire</th>
                            <th>Quantité</th>
                            <th>Sous-total</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>
                        <tbody id="cartBody"></tbody>
                        <tfoot class="table-light">
                        <tr>
                            <td colspan="3" class="text-end fw-bold">Total :</td>
                            <td>
                                <span id="cartTotal" class="badge bg-danger fs-6"></span>
                            </td>
                            <td></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-outline-danger" onclick="clearCart()">
                    Vider le panier
                </button>
                <!-- le bouton est desactivé si non loggé -->
                <button class="btn btn-success"
                        th:if="${currentUser != null}"
                        onclick="placeOrder()">
                    Passer la commande
                </button>
                <a th:if="${currentUser == null}"
                   th:href="@{/login}"
                   class="btn btn-warning">
                    Connectez-vous pour commander
                </a>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        const isLoggedIn = /*[[${currentUser != null}]]*/ false;

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const body = document.getElementById('cartBody');
            const emptyDiv = document.getElementById('emptyCart');
            const cartContainer = document.getElementById('cartContainer');

            if (cart.length === 0) {
                emptyDiv.classList.remove('d-none');
                cartContainer.classList.add('d-none');
                return;
            }

            emptyDiv.classList.add('d-none');
            cartContainer.classList.remove('d-none');

            body.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                body.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td><span class="badge bg-success">${item.price} €</span></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-outline-secondary" onclick="changeQty(${index}, -1)">−</button>
                                <span>${item.quantity}</span>
                                <button class="btn btn-sm btn-outline-secondary" onclick="changeQty(${index}, 1)">+</button>
                            </div>
                        </td>
                        <td><span class="badge bg-primary">${subtotal.toFixed(2)} €</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">Retirer</button>
                        </td>
                    </tr>`;
            });

            document.getElementById('cartTotal').textContent = total.toFixed(2) + ' €';
        }

        function changeQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartBadge();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            updateCartBadge();
        }

        function clearCart() {
            if (confirm('Vider le panier ?')) {
                localStorage.removeItem('cart');
                renderCart();
                updateCartBadge();
            }
        }

        function placeOrder() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) return alert('Votre panier est vide.');

            fetch('/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cart)
            }).then(res => {
                if (res.ok) {
                    localStorage.removeItem('cart');
                    updateCartBadge();
                    window.location.href = '/orderConfirmation';
                } else {
                    alert('Erreur lors de la commande.');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</div>
</body>
</html>
