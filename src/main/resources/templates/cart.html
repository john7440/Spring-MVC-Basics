<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Mon panier</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-primary fw-bold">Mon panier</h4>
            <a th:href="@{/index}" class="btn btn-outline-primary">
                Continuer mes achats
            </a>
        </div>

        <!-- Panier vide -->
        <div th:if="${#lists.isEmpty(cart.items)}" class="alert alert-info text-center">
            Votre panier est vide
        </div>

        <!-- Tableau des articles du panier -->
        <div th:if="${!#lists.isEmpty(cart.items)}">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                        <tr>
                            <th>Article</th>
                            <th>Marque</th>
                            <th>Prix unitaire</th>
                            <th>Quantité</th>
                            <th>Sous-total</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td th:text="${item.article.model}"></td>
                            <td th:text="${item.article.brand}"></td>
                            <td>
                                    <span class="badge bg-success"
                                          th:text="${item.article.price} + ' €'"></span>
                            </td>
                            <td th:text="${item.quantity}"></td>
                            <td>
                                    <span class="badge bg-primary"
                                          th:text="${item.article.price * item.quantity} + ' €'"></span>
                            </td>
                            <td class="text-center">
                                <a class="btn btn-sm btn-danger"
                                   th:href="@{/cart/remove(itemId=${item.id})}"
                                   onclick="return confirm('Retirer cet article ?')">
                                    Retirer
                                </a>
                            </td>
                        </tr>
                        </tbody>
                        <tfoot class="table-light">
                        <tr>
                            <td colspan="4" class="text-end fw-bold">Total :</td>
                            <td>
                                    <span class="badge bg-danger fs-6"
                                          th:text="${cart.total} + ' €'"></span>
                            </td>
                            <td></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex justify-content-between mt-3">
                <a th:href="@{/cart/clear}"
                   class="btn btn-outline-danger"
                   onclick="return confirm('Vider le panier ?')">
                    Vider le panier
                </a>
                <a th:href="@{/cart/order}" class="btn btn-success">
                    Passer la commande
                </a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
