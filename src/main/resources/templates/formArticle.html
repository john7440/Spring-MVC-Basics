<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Formulaire ajout article</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4 mb-3">
        <div class="card border-dark">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="mb-0">Ajouter un article</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/save}" th:object="${article}" method="post">

                    <div class="mb-3">
                        <label for="brand" class="form-label">Marque</label>
                        <input type="text" id="brand" th:field="*{brand}"
                               class="form-control" placeholder="Ex: Samsung">
                        <span th:errors="${article.brand}" class="text-danger"></span>
                    </div>

                    <div class="mb-3">
                        <label for="model" class="form-label">Modèle</label>
                        <input type="text" id="model" th:field="*{model}"
                               class="form-control" placeholder="Ex: Galaxy S24">
                        <span th:errors="${article.model}" class="text-danger"></span>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" th:field="*{description}"
                                  class="form-control" rows="3"
                                  placeholder="Décrivez l'article..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Prix (€)</label>
                        <input type="number" id="price" th:field="*{price}"
                               class="form-control" placeholder="Ex: 299.99" step="0.01" min="0">
                               <span th:errors="${article.price}" class="text-danger"></span>
                    </div>

                    <div class="mb-3">
                    <label for="category" class="form-label">Catégorie</label>
                    <select id="category" name="categoryId" class="form-select">
                        <option value="">Sélectionner une catégorie</option>
                        <option th:each="cat : ${listCategories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>
                    </select>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <button type="submit" class="btn btn-primary">
                            Enregistrer
                        </button>
                        <a th:href="@{/index}" class="btn btn-danger">
                            Annuler
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
