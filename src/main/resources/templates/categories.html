<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Gestion des catégories</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-dark fw-bold text-center">Gestion des catégories</h4>
            <a th:href="@{/index}" class="btn btn-outline-secondary">Retour</a>
        </div>

        <div class="row gap-4">

            <div class="col-md-4">
                <div class="card border-1 border-dark shadow-sm">
                    <div class="card-header bg-success text-white">
                        Ajouter une catégorie
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/saveCategory}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nom</label>
                                <input type="text" name="name" class="form-control"
                                       placeholder="Ex: Smartphones" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                Ajouter
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card border-1 border-dark shadow-sm mb-3">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-primary">
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(categories)}">
                                <td colspan="3" class="text-center text-muted py-4">
                                    Aucune catégorie
                                </td>
                            </tr>
                            <tr th:each="cat : ${categories}">
                                <td th:text="${cat.id}"></td>
                                <td>
                                    <form th:action="@{/admin/saveCategory}"
                                          method="post"
                                          class="d-flex gap-3">
                                        <input type="hidden" name="id" th:value="${cat.id}">
                                        <input type="text" name="name"
                                               th:value="${cat.name}"
                                               class="form-control form-control-sm me-1">
                                        <button type="submit" class="btn btn-sm btn-warning me-1"
                                                onclick="return alert('Catégorie modifiée')"> Modifier
                                        </button>
                                    </form>
                                </td>
                                <td class="text-center">

                                    <a class="btn btn-sm btn-danger me-1"
                                       th:href="@{/admin/deleteCategory(id=${cat.id})}"
                                       onclick="return confirm('Supprimer cette catégorie ?')">
                                        Supprimer
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
